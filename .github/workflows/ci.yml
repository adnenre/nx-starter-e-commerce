name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  PNPM_VERSION: 9
  NODE_VERSION: 22.14.0

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Clean workspace caches
        run: |
          rm -rf node_modules
          rm -rf .nx
          rm -rf .turbo
          rm -rf dist

          find . -type d -name "dist" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".vite" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "coverage" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "test-output" -exec rm -rf {} + 2>/dev/null || true

          find . -type f -name "*.tsbuildinfo" -delete 2>/dev/null || true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reset Nx daemon/cache
        run: pnpm exec nx reset

      - name: Build all projects
        run: pnpm exec nx run-many -t build --all --skip-nx-cache

      - name: Typecheck all projects
        run: pnpm exec nx run-many -t typecheck --all --skip-nx-cache

      - name: Test all projects
        run: pnpm exec nx run-many -t test --all --skip-nx-cache

      - name: Lint all projects
        run: pnpm exec nx run-many -t lint --all --skip-nx-cache
